<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #ff5722;
      --secondary: #ff8a65;
      --bg: #f4f6f9;
      --text: #333;
      --radius: 12px;
      --spacing: 20px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing);
      background: linear-gradient(90deg, #ff5722, #ff8a65);
      color: white;
    }

    header button {
      background: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* MAIN */
    main {
      padding: var(--spacing);
      display: grid;
      gap: 20px;
    }

    /* SECTION */
    section {
      background: white;
      padding: var(--spacing);
      border-radius: var(--radius);
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h2 {
      margin-bottom: 10px;
      color: var(--primary);
    }

    /* CARD GRID */
    .card-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* CARD */
    .card {
      background: #fff;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #eee;
      transition: 0.3s;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.12);
    }

    /* IMAGE */
    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 8px;
      transition: 0.3s;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .price {
      color: var(--primary);
      font-weight: bold;
      margin: 5px 0;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #e64a19;
    }

    /* LIST */
    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 8px;
    }

    /* TABLET */
    @media (min-width: 768px) {
      main {
        grid-template-columns: 1fr 1fr;
      }

      section:first-child {
        grid-column: span 2;
      }
    }

    /* DESKTOP */
    @media (min-width: 1024px) {
      main {
        grid-template-columns: 2fr 1fr;
      }

      .card-list {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>📊 Shop Dashboard</h1>
    <button>🔔 Thông báo</button>
  </header>

  <!-- MAIN -->
  <main>

    <!-- OVERVIEW -->
    <section>
      <h2>Tổng quan</h2>
      <p>5 đơn hàng mới, 2 đơn cần xử lý hôm nay.</p>
    </section>

    <!-- PRODUCTS -->
    <section>
      <h2>Sản phẩm bán chạy</h2>

      <div class="card-list">

        <div class="card">
          <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600">
          <h3>Giày Sneaker</h3>
          <p class="price">450.000đ</p>
          <button>Bán lại</button>
        </div>

        <div class="card">
          <img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=600">
          <h3>Đồng hồ</h3>
          <p class="price">1.200.000đ</p>
          <button>Bán lại</button>
        </div>

        <div class="card">
          <img src="https://images.unsplash.com/photo-1518443895914-6b6b5e7a94e4?w=600">
          <h3>Tai nghe</h3>
          <p class="price">250.000đ</p>
          <button>Bán lại</button>
        </div>

      </div>
    </section>

    <!-- TASK -->
    <section>
      <h2>Công việc cần làm</h2>
      <ul>
        <li>Giao hàng đơn #1023</li>
        <li>Nhập thêm hàng</li>
        <li>Trả lời khách hàng</li>
      </ul>
    </section>

  </main>

</body>
</html>
