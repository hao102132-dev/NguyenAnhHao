<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Settings</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #ff5722;
      --bg: #f5f5f5;
      --text: #333;
      --radius: 12px;
      --spacing: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
    }

    /* HEADER */
    header {
      padding: var(--spacing);
      background: linear-gradient(90deg, #ff5722, #ff8a65);
      color: white;
      text-align: center;
    }

    /* PROFILE AVATAR */
    .avatar-box {
      text-align: center;
      margin-top: -40px;
    }

    .avatar-box img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
    }

    .avatar-box button {
      margin-top: 8px;
      font-size: 12px;
      padding: 6px 10px;
    }

    /* MAIN */
    main {
      padding: var(--spacing);
      max-width: 600px;
      margin: auto;
    }

    /* CARD */
    section {
      background: white;
      padding: var(--spacing);
      border-radius: var(--radius);
      margin-bottom: 16px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }

    h2 {
      margin-bottom: 10px;
      color: var(--primary);
      font-size: 16px;
    }

    /* INPUT */
    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 5px rgba(255,87,34,0.3);
    }

    /* CHECKBOX */
    input[type="checkbox"] {
      width: auto;
      margin-right: 6px;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: #e64a19;
    }

    .btn-secondary {
      background: #ddd;
    }

    /* GROUP BUTTON */
    .btn-group {
      display: flex;
      gap: 10px;
    }

    .btn-group button {
      flex: 1;
    }

    /* RESPONSIVE */
    @media (min-width: 768px) {
      main {
        max-width: 700px;
      }
    }

  </style>
</head>

<body>

<header>
  <h2>👤 Hồ sơ cá nhân</h2>
</header>

<!-- AVATAR -->
<div class="avatar-box">
  <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=300">
  <button class="btn-secondary">Đổi ảnh</button>
</div>

<main>
  <form>

    <!-- ACCOUNT -->
    <section>
      <h2>Tài khoản</h2>

      <label>Họ tên</label>
      <input type="text" placeholder="Nguyễn Anh Hào">

      <label>Email</label>
      <input type="email" placeholder="hao@gmail.com">

      <label>Ngôn ngữ</label>
      <select>
        <option>Tiếng Việt</option>
        <option>English</option>
        <option>Japanese</option>
      </select>
    </section>

    <!-- PREFERENCES -->
    <section>
      <h2>Tùy chọn</h2>

      <label>
        <input type="checkbox" checked>
        Nhận thông báo email
      </label>

      <label>
        <input type="checkbox">
        Nhận khuyến mãi
      </label>

      <label>Giao diện</label>
      <select>
        <option>Sáng</option>
        <option>Tối</option>
        <option>Hệ thống</option>
      </select>
    </section>

    <!-- SECURITY -->
    <section>
      <h2>Bảo mật</h2>

      <button type="button" class="btn-primary">Đổi mật khẩu</button>
      <button type="button" class="btn-secondary">Bật 2FA</button>
    </section>

    <!-- ACTION -->
    <section>
      <div class="btn-group">
        <button type="submit" class="btn-primary">Lưu</button>
        <button type="button" class="btn-secondary">Hủy</button>
      </div>
    </section>

  </form>
</main>

</body>
</html>
